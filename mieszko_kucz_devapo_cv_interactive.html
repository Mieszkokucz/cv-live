<title>Mieszko Kucz — CV</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap');

:root {
  --bg:       #0c1015;
  --panel:    #141a22;
  --panel2:   #1a2230;
  --border:   #2a3340;
  --border2:  #364050;
  --amber:    #d4a574;
  --amber-d:  #7a5535;
  --amber-h:  #f0c897;
  --green:    #7ee787;
  --blue:     #58a6ff;
  --purple:   #bc8cff;
  --cyan:     #56d4dd;
  --red:      #ff7b72;
  --text:     #c9d1d9;
  --text-d:   #8b949e;
  --text-h:   #f0f6fc;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  line-height: 1.6;
  min-height: 100vh;
  padding: 24px 16px;
}

/* ───── SHELL ───── */
.shell {
  max-width: 860px;
  margin: 0 auto;
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  box-shadow:
    0 0 0 1px rgba(255,255,255,.03),
    0 32px 80px rgba(0,0,0,.6),
    0 0 60px rgba(212,165,116,.03);
}

/* titlebar */
.titlebar {
  background: var(--panel);
  padding: 11px 16px;
  display: flex; align-items: center;
  border-bottom: 1px solid var(--border);
  position: relative;
  user-select: none;
}
.dots { display: flex; gap: 7px; }
.dot  { width: 11px; height: 11px; border-radius: 50%; }
.dot.r { background: #ff5f56; } .dot.y { background: #ffbd2e; } .dot.g { background: #27c93f; }

.win-title {
  position: absolute; left: 50%; transform: translateX(-50%);
  font-size: 11px; color: var(--text-d);
  background: var(--panel2); padding: 3px 14px; border-radius: 5px;
  display: flex; align-items: center; gap: 6px; white-space: nowrap;
}
.win-title .ico { color: var(--amber); }

.lang-toggle { position: absolute; right: 16px; display: flex; gap: 2px; }
.lbtn {
  background: transparent; border: 1px solid var(--border);
  color: var(--text-d); padding: 3px 10px;
  font-family: inherit; font-size: 10px; cursor: pointer; transition: all .15s;
}
.lbtn:first-child { border-radius: 4px 0 0 4px; }
.lbtn:last-child  { border-radius: 0 4px 4px 0; }
.lbtn.on { background: var(--amber); color: var(--bg); border-color: var(--amber); font-weight: 600; }
.lbtn:hover:not(.on) { border-color: var(--amber-d); color: var(--amber); }

/* body */
.body { background: var(--bg); padding: 28px; }

/* ───── PHASE 1: INPUT ───── */
.phase-input { margin-bottom: 28px; }

.input-label {
  font-size: 9px; text-transform: uppercase; letter-spacing: .2em;
  color: var(--text-d); margin-bottom: 8px;
  display: flex; align-items: center; gap: 6px;
}
.input-label::before { content: '$'; color: var(--amber); }

.offer-box {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 7px;
  overflow: hidden;
}

.offer-header {
  padding: 8px 14px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.offer-role-label { font-size: 10px; color: var(--text-d); }
.offer-role-val   { font-size: 12px; color: var(--amber-h); font-weight: 600; }

.offer-company-val { font-size: 11px; color: var(--text-d); font-style: italic; }

.offer-body {
  padding: 14px;
  font-size: 11px; color: var(--text-d); line-height: 1.75;
  max-height: 140px; overflow-y: auto;
}
.offer-body::-webkit-scrollbar { width: 4px; }
.offer-body::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* ───── PHASE 2: THINKING ───── */
.phase-thinking { margin-bottom: 22px; }

.thinking-wrap {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}

.thinking-hd {
  padding: 9px 14px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px;
  font-size: 10.5px; color: var(--text-d);
}
.spin-icon {
  display: inline-block;
  animation: spin 1.8s linear infinite;
  color: var(--amber); font-size: 13px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.thinking-hd .done-icon { display: none; color: var(--green); }

.thinking-body {
  padding: 14px 16px;
  font-size: 11.5px; color: var(--text-d); line-height: 1.8;
  border-left: 2px solid var(--border2); margin: 0 14px 14px;
  font-style: italic;
  min-height: 20px;
}

/* ───── PHASE 3: RESPONSE ───── */
.phase-response { opacity: 0; transition: opacity .4s; }
.phase-response.visible { opacity: 1; }

.resp-hd {
  display: flex; align-items: center; gap: 10px;
  color: var(--amber); font-size: 10px; letter-spacing: .15em;
  margin-bottom: 24px;
}
.resp-hd-line { flex: 1; height: 1px; background: var(--border); }

/* name block */
.name-block { margin-bottom: 22px; }
.name-big {
  font-size: 24px; font-weight: 700; letter-spacing: 2.5px;
  color: var(--text-h); line-height: 1;
}
.name-big .last { color: var(--amber); }
.name-meta { font-size: 11px; color: var(--text-d); margin-top: 6px; }
.name-meta a { color: var(--blue); text-decoration: none; }
.applying-line { margin-top: 6px; font-size: 11px; }
.applying-lbl { color: var(--text-d); }
.applying-val { color: var(--amber-h); font-weight: 600; }

/* section */
.s { margin-bottom: 22px; }
.s-hd {
  font-size: 9px; font-weight: 600; text-transform: uppercase;
  letter-spacing: .2em; color: var(--amber);
  margin-bottom: 10px;
  display: flex; align-items: center; gap: 6px;
}
.s-hd::before { content: '##'; color: var(--amber-d); font-weight: 400; }

/* narrative paragraph */
.narrative {
  font-size: 12px; line-height: 1.85; color: var(--text);
  padding: 13px 16px;
  background: var(--panel); border-radius: 6px;
  border-left: 3px solid var(--amber-d);
}
.narrative strong { color: var(--text-h); font-weight: 600; }

/* match points */
.match-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
@media (max-width: 600px) { .match-grid { grid-template-columns: 1fr; } }

.match-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 12px 14px;
  transition: border-color .2s;
}
.match-card:hover { border-color: var(--amber-d); }

.match-req {
  font-size: 9.5px; text-transform: uppercase; letter-spacing: .12em;
  color: var(--text-d); margin-bottom: 5px;
  display: flex; align-items: center; gap: 5px;
}
.match-req::before { content: '//'; color: var(--amber-d); }

.match-title {
  font-size: 11.5px; font-weight: 600; color: var(--text-h);
  margin-bottom: 4px;
}
.match-proof {
  font-size: 11px; color: var(--text-d); line-height: 1.6;
}
.match-proof em { color: var(--cyan); font-style: normal; }

/* score */
.score-wrap {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 8px; padding: 16px 18px;
  margin-bottom: 22px;
}
.score-row {
  display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
}
.score-lbl { font-size: 10.5px; color: var(--text-d); white-space: nowrap; }
.score-bar { flex: 1; display: flex; gap: 3px; min-width: 120px; }
.bar-seg {
  height: 12px; flex: 1; border-radius: 2px;
  background: var(--border); position: relative; overflow: hidden;
}
.bar-seg .fill {
  position: absolute; inset: 0;
  background: var(--amber);
  transform: scaleX(0); transform-origin: left;
  transition: transform .25s ease;
}
.bar-seg.lit .fill { transform: scaleX(1); }

.score-num     { font-size: 15px; font-weight: 700; color: var(--amber-h); white-space: nowrap; }
.score-verdict { font-size: 10.5px; color: var(--green); white-space: nowrap; }

/* bottom prompt */
.bottom-prompt {
  padding-top: 18px;
  border-top: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px;
  font-size: 12px;
}
.prompt-char { color: var(--amber); font-weight: 700; }
.prompt-txt  { color: var(--text-h); }
.cursor {
  display: inline-block; width: 7px; height: 14px;
  background: var(--amber); vertical-align: middle; margin-left: 2px;
  animation: blink 1s step-end infinite;
}
@keyframes blink { 50% { opacity: 0; } }

/* easter egg */
.easter { text-align: center; color: var(--border); font-size: 9px; margin-top: 14px; }

/* ───── STREAM CURSOR (inline) ───── */
.stream-cursor {
  display: inline-block; width: 6px; height: 13px;
  background: var(--text-d); vertical-align: middle;
  animation: blink 0.7s step-end infinite; margin-left: 1px;
}

/* scrollbar global */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

@media print {
  body { background: var(--bg); padding: 0; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .shell { border: none; box-shadow: none; }
  .cursor, .spin-icon, .stream-cursor { animation: none; }
}
</style>
</head>

<script>
let currentLang = 'pl';

function switchLang(lang) {
  currentLang = lang;
  document.getElementById('btn-pl').classList.toggle('on', lang === 'pl');
  document.getElementById('btn-en').classList.toggle('on', lang === 'en');
  document.documentElement.lang = lang;
  // re-render static UI strings
  renderUI(lang);
  // re-render data (if already revealed)
  renderData(lang);
}

function renderUI(lang) {
  const u = UI[lang];
  document.getElementById('win-title-txt').textContent    = u.winTitle;
  document.getElementById('input-label-txt').textContent  = u.inputLabel;
  document.getElementById('offer-role-lbl').textContent   = u.offerRoleLbl;
  document.getElementById('thinking-lbl-txt').textContent = thinkingDone ? u.thinkingDone : u.thinkingLbl;
  document.getElementById('resp-hd-txt').textContent      = u.respHd;
  document.getElementById('name-meta').textContent        = u.nameMeta;
  document.getElementById('applying-lbl-txt').textContent = u.applyingLbl;
  document.getElementById('narrative-hd-txt').textContent = u.narrativeHd;
  document.getElementById('match-hd-txt').textContent     = u.matchHd;
  document.getElementById('score-lbl-txt').textContent    = u.scoreLbl;
}

function renderData(lang) {
  const d = DATA.lang[lang];
  // offer
  document.getElementById('offer-role-val').textContent    = d.offerRole;
  document.getElementById('offer-company-val').textContent = d.offerCompany;
  document.getElementById('offer-body').textContent        = d.offerText;
  // applying
  document.getElementById('applying-val').textContent = d.offerRole;
  // narrative (HTML allowed for <strong>)
  document.getElementById('narrative-body').innerHTML = d.narrative;
  // score
  document.getElementById('score-num').textContent     = d.score + '/100';
  document.getElementById('score-verdict').textContent = d.verdict;
  // cta
  document.getElementById('cta-txt').textContent = d.cta;
  // match cards
  buildMatchCards(lang);
  // score bar
  buildScoreBar(lang);
}

function buildMatchCards(lang) {
  const grid = document.getElementById('match-grid');
  grid.innerHTML = '';
  DATA.lang[lang].matches.forEach(m => {
    const card = document.createElement('div');
    card.className = 'match-card';
    card.innerHTML = `
      <div class="match-req">${m.req}</div>
      <div class="match-title">${m.title}</div>
      <div class="match-proof">${m.proof}</div>
    `;
    grid.appendChild(card);
  });
}

function buildScoreBar(lang) {
  const score = DATA.lang[lang].score;
  const bar = document.getElementById('score-bar');
  bar.innerHTML = '';
  const segments = 10;
  const filled = Math.round(score / 10);
  for (let i = 0; i < segments; i++) {
    const seg = document.createElement('div');
    seg.className = 'bar-seg';
    seg.innerHTML = '<div class="fill"></div>';
    bar.appendChild(seg);
    if (i < filled) {
      setTimeout(() => seg.classList.add('lit'), 600 + i * 100);
    }
  }
}

// ── STREAMING SIMULATION ──────────────────────
let thinkingDone = false;

function streamText(elementId, text, speed, onDone) {
  const el = document.getElementById(elementId);
  el.innerHTML = '';
  // add inline cursor
  const cur = document.createElement('span');
  cur.className = 'stream-cursor';
  el.appendChild(cur);

  let i = 0;
  function tick() {
    if (i < text.length) {
      // insert character before cursor
      el.insertBefore(document.createTextNode(text[i]), cur);
      i++;
      // variable speed: slower at punctuation
      const ch = text[i - 1];
      const delay = /[.,;:!?]/.test(ch) ? speed * 6 : /\n/.test(ch) ? speed * 4 : speed;
      setTimeout(tick, delay + Math.random() * speed * 0.5);
    } else {
      cur.remove();
      if (onDone) onDone();
    }
  }
  tick();
}

function revealResponse() {
  const resp = document.getElementById('phase-response');
  resp.classList.add('visible');
  // score bar
  buildScoreBar(currentLang);
}

function markThinkingDone() {
  thinkingDone = true;
  document.getElementById('think-spin').style.display = 'none';
  const doneEl = document.getElementById('think-done');
  doneEl.style.display = 'inline';
  document.getElementById('thinking-lbl-txt').textContent = UI[currentLang].thinkingDone;
}

function runSequence(lang) {
  const d = DATA.lang[lang];

  // populate static offer data immediately
  renderData(lang);

  // wait a beat, then stream thinking
  setTimeout(() => {
    streamText('thinking-body', d.thinkingText, 18, () => {
      // thinking done
      setTimeout(() => {
        markThinkingDone();
        setTimeout(() => {
          revealResponse();
        }, 400);
      }, 300);
    });
  }, 800);
}

// ── INIT ─────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  const lang = DATA.defaultLang || 'pl';
  currentLang = lang;
  document.getElementById('btn-pl').classList.toggle('on', lang === 'pl');
  document.getElementById('btn-en').classList.toggle('on', lang === 'en');
  document.documentElement.lang = lang;
  renderUI(lang);
  runSequence(lang);
});
</script>
